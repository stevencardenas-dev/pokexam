spring.application.name=demo

# Supabase PostgreSQL connection
spring.datasource.url=jdbc:postgresql://diknivqnzpmmmzssojjg.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# HikariCP connection pool (tuned for Supabase free tier)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# Server
server.port=8081

# Springdoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Supabase REST API keys - set via environment variables
supabase.url=https://diknivqnzpmmmzssojjg.supabase.co
supabase.anon-key=
supabase.service-key=
